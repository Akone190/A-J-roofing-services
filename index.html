    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #111111;
            --bg-tertiary: #0D0D0D;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --accent-primary: #00D4FF;
            --accent-secondary: #FFD700;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --accent-glow-strong: rgba(0, 212, 255, 0.5);
            --gold-glow: rgba(255, 215, 0, 0.3);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-tertiary: #666666;
            --border: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(255, 255, 255, 0.2);
            --gradient-1: linear-gradient(135deg, #00D4FF, #0099CC);
            --gradient-2: linear-gradient(135deg, #FFD700, #FFA500);
            --gradient-3: linear-gradient(135deg, #00D4FF, #FFD700);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Selection */
        ::selection {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00b8e6;
        }

        /* Page Loader */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s var(--transition-smooth), visibility 0.6s var(--transition-smooth);
        }

        .page-loader.loaded {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-logo {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient-3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }

        .loader-bar {
            width: 200px;
            height: 3px;
            background: var(--surface);
            border-radius: 3px;
            overflow: hidden;
            margin: 0 auto;
        }

        .loader-bar::after {
            content: '';
            display: block;
            width: 40%;
            height: 100%;
            background: var(--gradient-1);
            border-radius: 3px;
            animation: loaderSlide 1s ease-in-out infinite;
        }

        @keyframes loaderSlide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        /* ==================== NAVIGATION ==================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.4s var(--transition-smooth);
        }

        .navbar.scrolled {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            z-index: 1001;
        }

        .nav-logo-icon {
            width: 45px;
            height: 45px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .nav-logo-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2));
        }

        .nav-logo-text {
            display: flex;
            flex-direction: column;
        }

        .nav-logo-text .brand {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .nav-logo-text .tagline {
            font-size: 0.65rem;
            color: var(--accent-primary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            transition: color 0.3s var(--transition-smooth);
            padding: 0.5rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-1);
            border-radius: 2px;
            transition: width 0.3s var(--transition-smooth);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            padding: 0.75rem 1.75rem;
            background: var(--gradient-1);
            color: var(--bg-primary) !important;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s var(--transition-smooth);
            box-shadow: 0 4px 15px var(--accent-glow);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow-strong);
        }

        .nav-cta::after {
            display: none !important;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            padding: 5px;
        }

        .menu-toggle span {
            width: 28px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.3s var(--transition-smooth);
            transform-origin: center;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Mobile Menu Overlay */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--transition-smooth);
        }

        .mobile-menu.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-menu-content {
            text-align: center;
        }

        .mobile-menu-content a {
            display: block;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 2rem;
            font-weight: 700;
            padding: 1rem;
            transition: all 0.3s var(--transition-smooth);
            transform: translateY(20px);
            opacity: 0;
        }

        .mobile-menu.active .mobile-menu-content a {
            transform: translateY(0);
            opacity: 1;
        }

        .mobile-menu.active .mobile-menu-content a:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-menu-content a:nth-child(2) { transition-delay: 0.15s; }
        .mobile-menu.active .mobile-menu-content a:nth-child(3) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-menu-content a:nth-child(4) { transition-delay: 0.25s; }
        .mobile-menu.active .mobile-menu-content a:nth-child(5) { transition-delay: 0.3s; }
        .mobile-menu.active .mobile-menu-content a:nth-child(6) { transition-delay: 0.35s; }

        .mobile-menu-content a:hover {
            color: var(--accent-primary);
        }

        .mobile-menu-cta {
            margin-top: 2rem;
            display: inline-flex;
        }

        .hero-bg {

        .hero-bg-image {

            opacity: 0.15;
        }

        .hero-bg-overlay {
            position: absolute;

            position: absolute;

            animation-delay: -7s;
        }
